apiVersion: batch/v1
kind: CronJob
metadata:
  name: pms-restart
  namespace: media
spec:
  concurrencyPolicy: Forbid
  timeZone: America/New_York
  schedule: '33 4 * * *' # Restart Plex every day at 4:33pm NY time
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          serviceAccountName: pms-restart
          restartPolicy: Never
          containers:
          - name: kubectl
            image: bitnami/kubectl
            command:
            - bash
            - -c
            - >-
              kubectl rollout restart sts/pms && kubectl rollout status sts/pms
