---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pms-iscsi-pvc
  namespace: media
spec:
  volumeName: pms-iscsi-pv
  resources:
    requests:
      storage: 80G
  accessModes:
    - ReadWriteOnce
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pms-pv-claim
  labels:
    app: pms
spec:
  storageClassName: rook-ceph-block
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
