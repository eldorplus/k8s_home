---
apiVersion: apps/v1
kind: CronJob
metadata:
  name: toolbox-cron
  namespace: media
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: toolbox
            command: ["/media/youtube/scripts/ytarchive-monitor.sh"]
            args: null
