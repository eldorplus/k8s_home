---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
nameSuffix: -ytarchive
images:
- name: docker.io/nlopez/media-toolbox
  newTag: "7f1a970"
- name: brainicism/bgutil-ytdlp-pot-provider
  newTag: "0.8.3"
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/instance: ytarchive
patches:
- path: patch.yaml
  target:
    kind: CronJob
    name: toolbox-cron
