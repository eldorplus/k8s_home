---
apiVersion: apps/v1
kind: CronJob
metadata:
  name: toolbox-cron
  namespace: media
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: toolbox
            command: ["/bin/bash"]
            args:
            - -xc
            - "/media/youtube/scripts/ytarchive-to-ytdlp.sh; sleep 60"
            livenessProbe:
              exec:
                command:
                - /bin/sh
                - -c
                - 'if [ $(pgrep -cx yt-dlp) > 0 ]; then exit 0; else exit 1; fi'
