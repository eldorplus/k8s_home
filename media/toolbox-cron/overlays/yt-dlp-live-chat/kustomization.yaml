---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
nameSuffix: -yt-dlp-live-chat
images:
- name: docker.io/nlopez/media-toolbox
  newTag: "7f1a970"
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/instance: yt-dlp-live-chat
patches:
- path: patch.yaml
  target:
    kind: CronJob
    name: toolbox-cron
