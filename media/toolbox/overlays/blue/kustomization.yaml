---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
nameSuffix: -blue
images:
- name: docker.io/nlopez/media-toolbox
  newTag: "7f1a970"
- name: brainicism/bgutil-ytdlp-pot-provider
  newTag: "0.8.3"
configMapGenerator:
- behavior: replace
  files:
  - yt-dlp.conf
  name: toolbox-config
patches:
# - path: patch.yaml
#   target:
#     kind: Deployment
#     name: toolbox
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/instance: blue
