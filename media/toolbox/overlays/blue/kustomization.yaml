---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
nameSuffix: -blue
images:
- name: docker.io/nlopez/media-toolbox
  newTag: 75e2720
- name: brainicism/bgutil-ytdlp-pot-provider
  newTag: 0.7.4
configMapGenerator:
- behavior: replace
  files:
  - yt-dlp.conf
  name: toolbox-config
patches:
- path: patch.yaml
  target:
    kind: Deployment
    name: toolbox
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/instance: blue
