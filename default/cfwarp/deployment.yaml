---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cfwarp
  namespace: default
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cfwarp
      version: v1
  template:
    metadata:
      labels:
        app: cfwarp
        version: v1
    spec:
      restartPolicy: Always
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: cfwarp
          image: caomingjun/warp:2025.4.929.0-2.12.0-cbfba700b5e8c1fa13f1063333a5bd6ae372e160
          imagePullPolicy: IfNotPresent
          resources:
            requests: {}
            limits: {}
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - MKNOD
                - AUDIT_WRITE
          env:
            - name: WARP_SLEEP
              value: "2"
      volumes:
        - name: cfwarp
          persistentVolumeClaim:
            claimName: cfwarp-pv-claim
