apiVersion: batch/v1
kind: CronJob
metadata:
  name: cfwarp-restart
  namespace: default
spec:
  concurrencyPolicy: Forbid
  timeZone: America/New_York
  schedule: '33 5 * * *' # Restart cfwarp every day at 5:33am NY time
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          serviceAccountName: cfwarp-restart
          restartPolicy: Never
          containers:
          - name: kubectl
            image: bitnami/kubectl
            command:
            - bash
            - -c
            - >-
              kubectl rollout restart deployment/cfwarp && kubectl rollout status deployment/cfwarp
